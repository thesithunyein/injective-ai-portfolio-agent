[package]
name = "portfolio-agent-odra"
version = "0.1.0"
edition = "2021"
authors = ["Casper AI Portfolio Agent"]
description = "Agentic AI portfolio analysis on Casper Network"

[dependencies]
odra = "1.5.1"
odra-casper-livenet-env = "1.5.1"
getrandom = { version = "0.2", features = ["js"] }

[features]
default = []

[[bin]]
name = "portfolio_agent_contract"
path = "src/main.rs"
test = false

[lib]
name = "portfolio_agent"
path = "src/lib.rs"
crate-type = ["cdylib", "lib"]
