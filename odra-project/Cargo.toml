[package]
name = "portfolio-agent-odra"
version = "0.1.0"
edition = "2021"
authors = ["Casper AI Portfolio Agent"]
description = "Agentic AI portfolio analysis on Casper Network"

[dependencies]
odra = { version = "2.7.1", default-features = false, features = ["casper"] }

[features]
default = []

[[bin]]
name = "portfolio_agent_contract"
path = "src/main.rs"
test = false

[lib]
name = "portfolio_agent"
path = "src/lib.rs"
crate-type = ["cdylib", "lib"]

[profile.release]
panic = "abort"
