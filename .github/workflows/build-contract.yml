name: Build Contract WASM

on:
  push:
    branches: [ main ]
    paths:
      - 'odra-project/**'
      - '.github/workflows/build-contract.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version
          rustup target list --installed

      - name: Install cargo-odra
        run: cargo install cargo-odra

      - name: Build contract WASM (Odra)
        working-directory: ./odra-project
        run: |
          rm -f Cargo.lock
          cargo odra build
          find . -name "*.wasm" -type f

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-agent-contract
          path: odra-project/**/*.wasm
          if-no-files-found: error

      - name: Notify success
        run: echo "Contract WASM built successfully! Download the artifact to deploy."
