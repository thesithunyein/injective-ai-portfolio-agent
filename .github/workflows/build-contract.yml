name: Build Contract WASM

on:
  push:
    branches: [ main ]
    paths:
      - 'odra-project/**'
      - '.github/workflows/build-contract.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version
          rustup target list --installed

      - name: Build contract WASM
        working-directory: ./odra-project
        env:
          RUSTFLAGS: "-C target-feature=-bulk-memory -C link-arg=--allow-undefined"
        run: |
          rm -f Cargo.lock
          cargo build --release --target wasm32-unknown-unknown 2>&1 | tee build.log
          ls -la target/wasm32-unknown-unknown/release/

      - name: Install Binaryen wasm-opt
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen
          wasm-opt --version

      - name: Strip bulk memory ops from WASM
        working-directory: ./odra-project
        run: |
          IN=target/wasm32-unknown-unknown/release/portfolio_agent_contract.wasm
          OUT=target/wasm32-unknown-unknown/release/portfolio_agent_contract_opt.wasm
          wasm-opt --disable-bulk-memory "$IN" -o "$OUT"
          ls -la "$OUT"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-agent-contract
          path: odra-project/target/wasm32-unknown-unknown/release/portfolio_agent_contract_opt.wasm
          if-no-files-found: error

      - name: Notify success
        run: echo "Contract WASM built successfully! Download the artifact to deploy."
