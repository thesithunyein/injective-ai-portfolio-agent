name: Build & Deploy Contract

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Build contract WASM
        working-directory: ./odra-project
        env:
          RUSTFLAGS: "-C link-arg=--allow-undefined"
        run: |
          rm -f Cargo.lock
          cargo build --release --target wasm32-unknown-unknown
          ls -la target/wasm32-unknown-unknown/release/*.wasm

      - name: Install casper-client
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          # Try latest release, fallback to older
          LATEST_URL=$(curl -s https://api.github.com/repos/casper-ecosystem/casper-client-rs/releases/latest | grep "browser_download_url.*amd64.deb" | head -1 | cut -d'"' -f4)
          if [ -z "$LATEST_URL" ]; then
            LATEST_URL="https://github.com/casper-ecosystem/casper-client-rs/releases/download/v2.0.0/casper-client_2.0.0-1_amd64.deb"
          fi
          curl -sL "$LATEST_URL" -o casper-client.deb
          sudo dpkg -i casper-client.deb || sudo apt-get install -f -y
          casper-client --version

      - name: Setup deployer key
        env:
          CSPR_TESTNET_PRIVATE_KEY: ${{ secrets.CSPR_TESTNET_PRIVATE_KEY }}
        run: |
          mkdir -p keys
          echo "$CSPR_TESTNET_PRIVATE_KEY" > keys/secret_key.pem
          chmod 600 keys/secret_key.pem

      - name: Deploy contract to Casper Testnet
        env:
          CSPR_TESTNET_PRIVATE_KEY: ${{ secrets.CSPR_TESTNET_PRIVATE_KEY }}
        run: |
          WASM_FILE=$(find ./odra-project/target/wasm32-unknown-unknown/release -name "*.wasm" -type f | head -1)
          echo "Deploying: $WASM_FILE"
          casper-client put-deploy \
            --node-address http://188.40.120.12:7777/rpc \
            --chain-name casper-testnet \
            --secret-key keys/secret_key.pem \
            --payment-amount 10000000000 \
            --session-path "$WASM_FILE" \
            --ttl 30m 2>&1 | tee deploy-output.txt

      - name: Extract and display deploy hash
        run: |
          echo "=== DEPLOY OUTPUT ==="
          cat deploy-output.txt
          echo ""
          echo "=== CHECK DEPLOY STATUS ==="
          DEPLOY_HASH=$(grep -oP '"deploy_hash"\s*:\s*"\K[^"]+' deploy-output.txt || echo "")
          if [ -n "$DEPLOY_HASH" ]; then
            echo "Deploy Hash: $DEPLOY_HASH"
            echo "Explorer: https://testnet.cspr.live/deploy/$DEPLOY_HASH"
            echo "CONTRACT_HASH=$DEPLOY_HASH" >> $GITHUB_ENV
          fi

      - name: Wait for deploy and get contract hash
        run: |
          DEPLOY_HASH=$(grep -oP '"deploy_hash"\s*:\s*"\K[^"]+' deploy-output.txt || echo "")
          if [ -n "$DEPLOY_HASH" ]; then
            echo "Waiting 90s for deploy to process..."
            sleep 90
            casper-client get-deploy "$DEPLOY_HASH" --node-address http://188.40.120.12:7777/rpc | tee deploy-status.txt
            echo ""
            echo "=== CONTRACT HASH (if successful) ==="
            grep -oP '"transforms"|"WriteContract"|contract' deploy-status.txt || echo "Check explorer manually"
          fi

      - name: Upload deployment results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-results
          path: |
            deploy-output.txt
            deploy-status.txt
