name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  web:
    name: Web app (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build must succeed without real secrets; routes read these at runtime.
          ANTHROPIC_API_KEY: ""

  contract:
    name: Odra contract (WASM build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Build contract WASM
        working-directory: ./odra-project
        env:
          RUSTFLAGS: "-C link-arg=--allow-undefined"
        run: |
          rm -f Cargo.lock
          cargo build --release --target wasm32-unknown-unknown
          ls -la target/wasm32-unknown-unknown/release/*.wasm
