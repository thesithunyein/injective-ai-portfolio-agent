name: Deploy Contract to Casper Testnet

# Manual deploy of the Odra PortfolioAgent contract to Casper 2.0 Testnet.
# Requires a FUNDED Testnet key stored as the repo secret CSPR_TESTNET_PRIVATE_KEY
# (the full secret_key.pem contents). Fund a key at https://testnet.cspr.live/tools/faucet.

on:
  workflow_dispatch:
    inputs:
      payment_amount_motes:
        description: 'Gas payment in motes (300000000000 = 300 CSPR)'
        required: false
        default: '300000000000'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (nightly + wasm target)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - name: Install binaryen
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen
          wasm-opt --version

      - name: Build contract WASM (Odra 2.x style)
        working-directory: ./odra-project
        env:
          ODRA_MODULE: PortfolioAgent
          RUSTFLAGS: "-C target-cpu=mvp -C link-arg=--allow-undefined -C strip=symbols"
        run: |
          rm -f Cargo.lock
          cargo build --release -Zbuild-std=panic_abort,std --target wasm32-unknown-unknown --bin portfolio_agent_odra_build_contract
          ls -la target/wasm32-unknown-unknown/release/*.wasm
          cp target/wasm32-unknown-unknown/release/portfolio_agent_odra_build_contract.wasm contract_raw.wasm

      - name: Strip bulk memory and optimize
        working-directory: ./odra-project
        run: |
          wasm-opt -Oz --disable-bulk-memory contract_raw.wasm -o contract_opt.wasm
          ls -la contract_opt.wasm
          echo "WASM_FILE=contract_opt.wasm" >> "$GITHUB_ENV"

      - name: Install casper-client
        run: |
          cargo install casper-client --locked
          casper-client --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies (for reading package hash)
        run: npm ci || npm install

      - name: Write funded deployer key
        env:
          CSPR_TESTNET_PRIVATE_KEY: ${{ secrets.CSPR_TESTNET_PRIVATE_KEY }}
        run: |
          if [ -z "$CSPR_TESTNET_PRIVATE_KEY" ]; then
            echo "::error::CSPR_TESTNET_PRIVATE_KEY secret is not set. Add a funded Testnet PEM key under repo Settings → Secrets."
            exit 1
          fi
          mkdir -p keys
          # Write PEM with proper line breaks. The secret must contain literal newlines.
          printf '%s\n' "$CSPR_TESTNET_PRIVATE_KEY" > keys/secret_key.pem
          chmod 600 keys/secret_key.pem
          echo "--- PEM header (first line) ---"
          head -1 keys/secret_key.pem
          echo "--- Line count ---"
          wc -l keys/secret_key.pem
          echo "--- Checking PEM format ---"
          if ! grep -q "BEGIN.*PRIVATE KEY" keys/secret_key.pem; then
            echo "::error::PEM header missing! The secret must contain the full PEM with line breaks."
            echo "Raw content preview (first 80 chars):"
            head -c 80 keys/secret_key.pem
            exit 1
          fi

      - name: Deploy contract (put-transaction session, install-upgrade)
        id: deploy
        run: |
          WASM="odra-project/$WASM_FILE"
          echo "Installing $WASM via put-transaction session (fixed pricing, install-upgrade)"
          ls -la "$WASM"
          casper-client put-transaction session \
            --node-address https://node.testnet.casper.network/rpc \
            --chain-name casper-test \
            --secret-key keys/secret_key.pem \
            --pricing-mode fixed \
            --gas-price-tolerance 2 \
            --transaction-path "$WASM" \
            --session-entry-point call \
            --category 'install-upgrade' \
            --session-arg "odra_cfg_package_hash_key_name:string='portfolio_agent_package_hash'" \
            --session-arg "odra_cfg_allow_key_override:bool='false'" \
            --session-arg "odra_cfg_is_upgradable:bool='true'" \
            2>&1 | tee deploy-output.txt

      - name: Wait for execution
        if: success()
        run: |
          # Extract the transaction hash (Version1) from the put output
          TXN_HASH=$(grep -oE '"Version1"\s*:\s*"[0-9a-f]{64}"' deploy-output.txt | grep -oE '[0-9a-f]{64}' | head -1)
          echo "Transaction hash: $TXN_HASH"
          echo "TXN_HASH=$TXN_HASH" >> "$GITHUB_ENV"
          echo "Explorer: https://testnet.cspr.live/transaction/$TXN_HASH"
          if [ -z "$TXN_HASH" ]; then
            echo "::error::No transaction hash found in output. Install likely rejected."
            exit 1
          fi
          sleep 90
          casper-client get-transaction \
            --node-address https://node.testnet.casper.network/rpc \
            "$TXN_HASH" 2>&1 | tee txn-result.txt
          if grep -q '"error_message"\s*:\s*"' txn-result.txt && ! grep -q '"error_message"\s*:\s*null' txn-result.txt; then
            echo "::error::Transaction failed on-chain. See txn-result.txt"
            grep -oE '"error_message"\s*:\s*"[^"]*"' txn-result.txt | head -1
            exit 1
          fi
          echo "Transaction executed successfully."

      - name: Read contract package hash
        if: success()
        env:
          CSPR_TESTNET_PRIVATE_KEY_PEM_PATH: keys/secret_key.pem
          ODRA_PACKAGE_KEY_NAME: portfolio_agent_package_hash
        run: |
          node scripts/read-package-hash.mjs 2>&1 | tee package-hash.txt

      - name: Upload deploy output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-output
          path: |
            deploy-output.txt
            txn-result.txt
            package-hash.txt
          if-no-files-found: warn

      - name: Next steps
        if: success()
        run: |
          echo "Install transaction: https://testnet.cspr.live/transaction/$TXN_HASH"
          echo "The contract package hash is in package-hash.txt (named key 'portfolio_agent_package_hash')."
          echo "Set PORTFOLIO_AGENT_PACKAGE_HASH in Vercel + .env.local with that value."
