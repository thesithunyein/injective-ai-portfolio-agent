name: Deploy Contract to Casper Testnet

# Manual deploy of the Odra PortfolioAgent contract to Casper 2.0 Testnet.
# Requires a FUNDED Testnet key stored as the repo secret CSPR_TESTNET_PRIVATE_KEY
# (the full secret_key.pem contents). Fund a key at https://testnet.cspr.live/tools/faucet.

on:
  workflow_dispatch:
    inputs:
      payment_amount_motes:
        description: 'Gas payment in motes (300000000000 = 300 CSPR)'
        required: false
        default: '300000000000'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (nightly + wasm target)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - name: Install binaryen
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen
          wasm-opt --version

      - name: Build contract WASM (Odra 2.x style)
        working-directory: ./odra-project
        env:
          ODRA_MODULE: PortfolioAgent
          RUSTFLAGS: "-C target-cpu=mvp -C link-arg=--allow-undefined -C strip=symbols"
        run: |
          rm -f Cargo.lock
          cargo build --release -Zbuild-std=panic_abort,std --target wasm32-unknown-unknown --bin portfolio_agent_odra_build_contract
          ls -la target/wasm32-unknown-unknown/release/*.wasm
          cp target/wasm32-unknown-unknown/release/portfolio_agent_odra_build_contract.wasm contract_raw.wasm

      - name: Strip bulk memory and optimize
        working-directory: ./odra-project
        run: |
          wasm-opt -Oz --disable-bulk-memory contract_raw.wasm -o contract_opt.wasm
          ls -la contract_opt.wasm
          echo "WASM_FILE=contract_opt.wasm" >> "$GITHUB_ENV"

      - name: Install casper-client (v5, Casper 2.0)
        run: |
          cargo install casper-client --locked
          casper-client --version

      - name: Write funded deployer key
        env:
          CSPR_TESTNET_PRIVATE_KEY: ${{ secrets.CSPR_TESTNET_PRIVATE_KEY }}
        run: |
          if [ -z "$CSPR_TESTNET_PRIVATE_KEY" ]; then
            echo "::error::CSPR_TESTNET_PRIVATE_KEY secret is not set. Add a funded Testnet PEM key under repo Settings → Secrets."
            exit 1
          fi
          mkdir -p keys
          printf '%s\n' "$CSPR_TESTNET_PRIVATE_KEY" > keys/secret_key.pem
          chmod 600 keys/secret_key.pem
          head -1 keys/secret_key.pem

      - name: Install contract (put-transaction session)
        id: deploy
        env:
          PAYMENT: ${{ github.event.inputs.payment_amount_motes }}
        run: |
          WASM="odra-project/$WASM_FILE"
          echo "Using WASM: $WASM"
          ls -la "$WASM"
          casper-client put-transaction session \
            --node-address https://node.testnet.casper.network/rpc \
            --chain-name casper-test \
            --secret-key keys/secret_key.pem \
            --payment-amount "${PAYMENT:-300000000000}" \
            --gas-price-tolerance 1 \
            --standard-payment true \
            --wasm-path "$WASM" \
            --session-arg "odra_cfg_package_hash_key_name:string:'portfolio_agent_$(date +%s)_package_hash'" \
            --session-arg "odra_cfg_allow_key_override:bool:'true'" \
            --session-arg "odra_cfg_is_upgradable:bool:'true'" \
            --session-arg "odra_cfg_is_upgrade:bool:'false'" \
            2>&1 | tee deploy-output.json

      - name: Upload deploy output
        uses: actions/upload-artifact@v4
        with:
          name: deploy-output
          path: deploy-output.json
          if-no-files-found: warn

      - name: Next steps
        run: |
          echo "Deploy submitted. Open the transaction hash above on https://testnet.cspr.live"
          echo "The contract package hash is stored under named key 'portfolio_agent_package_hash'"
          echo "on the deploying account: https://testnet.cspr.live/account/<your-public-key>"
