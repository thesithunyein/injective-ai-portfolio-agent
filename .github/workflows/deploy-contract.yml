name: Deploy Contract to Casper Testnet

on:
  workflow_dispatch:
    inputs:
      wasm_artifact_run_id:
        description: 'GitHub Actions run ID that built the WASM (leave empty for latest successful)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download WASM artifact from latest build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./wasm
          # Get latest successful build-contract workflow run
          RUN_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-contract.yml/runs?status=success&per_page=1" \
            | jq -r '.workflow_runs[0].id')
          echo "Latest build run ID: $RUN_ID"
          # Download artifact
          ARTIFACT_URL=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
            | jq -r '.artifacts[] | select(.name=="portfolio-agent-contract") | .archive_download_url')
          echo "Artifact URL: $ARTIFACT_URL"
          curl -s -L -H "Authorization: token $GH_TOKEN" -o artifact.zip "$ARTIFACT_URL"
          unzip -o artifact.zip -d ./wasm/
          ls -la ./wasm/
          find ./wasm -name "*.wasm" -type f

      - name: Install Rust and casper-client
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable
          cargo install casper-client --locked
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          casper-client --version

      - name: Setup deployer key
        env:
          CSPR_TESTNET_PRIVATE_KEY: ${{ secrets.CSPR_TESTNET_PRIVATE_KEY }}
        run: |
          mkdir -p keys
          echo "$CSPR_TESTNET_PRIVATE_KEY" > keys/secret_key.pem
          chmod 600 keys/secret_key.pem

      - name: Deploy contract
        env:
          CSPR_TESTNET_PRIVATE_KEY: ${{ secrets.CSPR_TESTNET_PRIVATE_KEY }}
        run: |
          set -x
          WASM_FILE=$(find ./wasm -name "*.wasm" -type f | head -1)
          echo "Deploying: $WASM_FILE"
          casper-client put-deploy \
            --node-address http://188.40.120.12:7777/rpc \
            --chain-name casper-testnet \
            --secret-key keys/secret_key.pem \
            --payment-amount 10000000000 \
            --session-path "$WASM_FILE" \
            --transfer-id 0 \
            --ttl 30m > deploy-output.json 2>&1 || true
          echo "=== RAW OUTPUT ==="
          cat deploy-output.json
          echo "=== END RAW OUTPUT ==="

      - name: Extract deploy hash
        run: |
          set -x
          # Try multiple patterns to extract deploy hash
          DEPLOY_HASH=$(cat deploy-output.json | grep -oP '"deploy_hash"\s*:\s*"\K[^"]+' | head -1)
          if [ -z "$DEPLOY_HASH" ]; then
            DEPLOY_HASH=$(cat deploy-output.json | grep -oP 'deploy_hash[[:space:]]+\K[0-9a-fA-F]{64}' | head -1)
          fi
          if [ -z "$DEPLOY_HASH" ]; then
            DEPLOY_HASH=$(cat deploy-output.json | grep -oP '[0-9a-fA-F]{64}' | head -1)
          fi
          echo "DEPLOY_HASH=$DEPLOY_HASH" >> $GITHUB_ENV
          echo "Deploy Hash: $DEPLOY_HASH"
          echo "$DEPLOY_HASH" > deploy-hash.txt

      - name: Wait and verify deployment
        run: |
          DEPLOY_HASH=$(cat deploy-hash.txt)
          if [ -z "$DEPLOY_HASH" ]; then
            echo "No deploy hash found - cannot verify"
            exit 0
          fi
          echo "Waiting 60 seconds for deploy to process..."
          sleep 60
          casper-client get-deploy "$DEPLOY_HASH" --node-address http://188.40.120.12:7777/rpc > deploy-status.json 2>&1 || true
          cat deploy-status.json

      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info
          path: |
            deploy-output.json
            deploy-status.json
            deploy-hash.txt
